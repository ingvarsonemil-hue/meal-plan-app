<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Meal Plan SaaS</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      padding: 40px;
      max-width: 600px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
    }

    #output {
      margin-top: 15px;
      white-space: pre-wrap;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<h1>🍽️ Meal Plan SaaS</h1>

<!-- REGISTER -->
<div class="card">
  <h3>Register</h3>
  <input id="regEmail" placeholder="Email">
  <input id="regPass" type="password" placeholder="Password">
  <button onclick="register()">Register</button>
</div>

<!-- LOGIN -->
<div class="card">
  <h3>Login</h3>
  <input id="logEmail" placeholder="Email">
  <input id="logPass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div class="card hidden" id="app">
  <h3>Generate Meal Plan</h3>

  <input id="budget" type="number" value="10">

  <button onclick="generate()">Generate</button>
  <button onclick="upgrade()">Upgrade to Premium (€5)</button>

  <div id="output"></div>
</div>

<script>
const API = "https://meal-plan-app-2nn3.onrender.com";

// REGISTER
async function register() {
  const email = document.getElementById("regEmail").value;
  const password = document.getElementById("regPass").value;

  const res = await fetch(API + "/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  alert(JSON.stringify(await res.json()));
}

// LOGIN
async function login() {
  const email = document.getElementById("logEmail").value;
  const password = document.getElementById("logPass").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    credentials: "include",
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById("app").classList.remove("hidden");
    alert("Logged in ✔");
  } else {
    alert(data.error);
  }
}

// GENERATE
async function generate() {
  const budget = document.getElementById("budget").value;

  const res = await fetch(API + "/generate", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    credentials: "include",
    body: JSON.stringify({
      prompt: "Make a cheap meal plan for €" + budget
    })
  });

  const data = await res.json();

  document.getElementById("output").innerText =
    data.result || data.error;
}

// UPGRADE (placeholder for Stripe)
async function upgrade() {
  const res = await fetch(API + "/create-checkout-session", {
    method: "POST"
  });

  const data = await res.json();
  window.location.href = data.url;
}
</script>

</body>
</html>
