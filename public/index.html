<!DOCTYPE html>
<html>
<head>
  <title>Meal Plan SaaS</title>
</head>
<body>

<h1>Meal Plan AI</h1>

<h3>Register / Login</h3>

<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<hr>

<h3>Generate Meal Plan</h3>

<textarea id="prompt" placeholder="Write your prompt"></textarea>
<br>
<button onclick="generate(async function generate() {
  const res = await fetch("/generate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify({
      prompt: prompt.value
    })
  });

  const data = await res.json();

  output.innerText = data.result || "No response from server";
})">Generate</button>

<pre id="output"></pre>

<script>
let token = "";

async function register() {
  await fetch("/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  alert("Registered!");
}

async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      email: email.value,
      password: password.value
    })
  });

  const data = await res.json();
  token = data.token;

  alert("Logged in!");
}

async function generate() {
  const res = await fetch("/generate", {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "Authorization":"Bearer " + token
    },
    body: JSON.stringify({
      prompt: prompt.value
    })
  });

  const data = await res.json();
  output.innerText = data.result;
}
</script>

</body>
</html>
