<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Generator</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      width: 400px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    input, textarea, button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
    }

    input, textarea {
      background: #334155;
      color: white;
    }

    button {
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    #output {
      margin-top: 15px;
      white-space: pre-wrap;
      background: #020617;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>AI Generator</h2>

    <!-- ✅ FIXED INPUT (removed broken oninput handler) -->
    <input 
      class="country-input" 
      type="text" 
      id="country" 
      placeholder="e.g. Sweden, Germany"
    />

    <textarea id="prompt" placeholder="Enter your prompt..."></textarea>

    <button onclick="generate()">Generate</button>

    <div id="output"></div>
  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById("prompt").value;
      const output = document.getElementById("output");

      if (!prompt) {
        output.textContent = "Please enter a prompt.";
        return;
      }

      output.textContent = "Loading...";

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();

        if (data.error) {
          output.textContent = data.error;
        } else {
          output.textContent = data.result;
        }
      } catch (err) {
        output.textContent = "Error: " + err.message;
      }
    }
  </script>

</body>
</html>
